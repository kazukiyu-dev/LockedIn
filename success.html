<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#061a33">
  <title>Enquiry sent | LockIn Tennis</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-page{min-height:100vh;display:grid;place-items:center;padding:40px 0;background:radial-gradient(circle at 20% 15%,rgba(32,183,239,.18),transparent 35%),linear-gradient(135deg,var(--navy-950),var(--navy-800));color:#fff}.success-card{width:min(650px,calc(100% - 30px));padding:55px 42px;text-align:center;border:1px solid rgba(255,255,255,.14);border-radius:30px;background:rgba(255,255,255,.06);box-shadow:0 30px 80px rgba(0,0,0,.28);backdrop-filter:blur(16px)}.success-icon{display:grid;place-items:center;width:84px;height:84px;margin:0 auto 24px;color:var(--navy-950);background:var(--yellow);border-radius:50%;font-size:40px;font-weight:900}.success-card h1{font-size:clamp(38px,7vw,62px);line-height:1.02;letter-spacing:-.04em;margin:0}.success-card p{max-width:510px;margin:20px auto 30px;color:rgba(255,255,255,.72);font-size:18px}
  </style>
</head>
<body>
  <main class="success-page">
    <section class="success-card">
      <div class="success-icon" aria-hidden="true">✓</div>
      <p class="eyebrow" style="justify-content:center"><span></span> Enquiry sent</p>
      <h1>Thanks for contacting LockIn Tennis.</h1>
      <p>Louis has received your coaching details and will get back to you soon.</p>
      <a class="button" href="index.html">Return to the website</a>
    </section>
  </main>
</body>
</html>
